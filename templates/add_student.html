<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h2>Add Student</h2>

    <form action="/add" method="POST">

        <label>Name:</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Age:</label>
        <input type="number" name="age" required>

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
